<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- XSS Vulnerability: Page Title reflects search query unsanitized -->
    <title>{% block title %}ShopEasy{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="demo-banner">
        Demo Site — Educational Purposes Only
    </div>
    
    <header>
        <div class="container nav-bar">
            <h1><a href="{{ url_for('index') }}" class="logo">ShopEasy</a></h1>
            
            <div class="search-container">
                <form action="{{ url_for('index') }}" method="GET">
                    <input type="text" name="q" placeholder="Search products..." value="{{ request.args.get('q', '') }}">
                    <button type="submit">Search</button>
                </form>
            </div>

            <nav>
                {% if session.get('user_name') %}
                    <span class="welcome-text">Hi, {{ session.get('user_name') }}</span>
                    <a href="{{ url_for('user_profile') }}" target="_blank">My Data (API)</a>
                    <a href="{{ url_for('logout') }}" class="btn">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn">Login / Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ShopEasy. For educational security testing only.</p>
        </div>
    </footer>
    
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
